<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NCalc.Playground.Browser</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css" />
    <!-- If you add any scoped CSS files, uncomment the following to load them
    <link href="NCalc.Playground.Browser.styles.css" rel="stylesheet" /> -->
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">x</span>
    </div>
    <script>
        (() => {
            const getParentBootstrapTheme = () => {
                if (window.parent === window) {
                    return null;
                }

                try {
                    const frameTheme = window.frameElement?.getAttribute('data-bs-theme');
                    if (frameTheme) {
                        return frameTheme;
                    }

                    const parentDocument = window.parent.document;
                    return parentDocument.documentElement.getAttribute('data-bs-theme')
                        || parentDocument.body?.getAttribute('data-bs-theme')
                        || null;
                } catch {
                    return null;
                }
            };

            const applyTheme = () => {
                const theme = getParentBootstrapTheme();
                document.documentElement.setAttribute('data-bs-theme', theme === 'dark' ? 'dark' : 'light');
            };

            const getObservableThemeElements = () => {
                if (window.parent === window) {
                    return [];
                }

                const elements = [];

                try {
                    if (window.frameElement) {
                        elements.push(window.frameElement);
                    }

                    const parentDocument = window.parent.document;
                    elements.push(parentDocument.documentElement);

                    if (parentDocument.body) {
                        elements.push(parentDocument.body);
                    }
                } catch {
                    return elements;
                }

                return elements;
            };

            applyTheme();

            getObservableThemeElements().forEach(element => {
                const observer = new MutationObserver(applyTheme);
                observer.observe(element, { attributes: true, attributeFilter: ['data-bs-theme'] });
            });
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
