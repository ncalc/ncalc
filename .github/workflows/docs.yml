name: Publish Docs and Showcase

on:
  push:
    branches:
      - master

permissions:
  actions: read
  pages: write
  id-token: write

jobs:
  publish-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Dotnet Setup
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Build and Generate Documentation
        env:
          DocFx: true # Workaround https://github.com/dotnet/docfx/issues/10808
        run: |
          dotnet tool update -g docfx
          cd docs
          docfx metadata
          docfx build

      - name: Restore Avalonia Showcase Workloads
        run: dotnet workload restore example/NCalc.Showcase/NCalc.Showcase.Browser/NCalc.Showcase.Browser.csproj

      - name: Build Avalonia Showcase
        run: dotnet build example/NCalc.Showcase/NCalc.Showcase.Browser/NCalc.Showcase.Browser.csproj --configuration Release

      - name: Stage GitHub Pages artifact
        run: |
          rm -rf artifacts/pages
          mkdir -p artifacts/pages/showcase
          cp -a docs/_site/. artifacts/pages/
          cp -a example/NCalc.Showcase/NCalc.Showcase.Browser/wwwroot/. artifacts/pages/showcase/
          cp -a example/NCalc.Showcase/NCalc.Showcase.Browser/bin/Release/net10.0-browser/wwwroot/. artifacts/pages/showcase/
          touch artifacts/pages/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
