name: Build & Test

on:
  push:
    branches:
      - master
      - release/*
  pull_request:
    branches:
      - master
      - release/*

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        aot: [false, true]

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: 1

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release

      - name: Test (normal)
        if: matrix.aot == 'false'
        run: dotnet test -c Release --no-build

      - name: Publish AOT
        if: matrix.aot == 'true'
        run: dotnet publish test/NCalc.Tests/NCalc.Tests.csproj \
          -c Release \
          -r linux-x64 \
          -p:PublishAot=true \
          -p:StripSymbols=true \
          --self-contained true

      - name: Run AOT binary
        if: matrix.aot == 'true'
        run: ./test/NCalc.Tests/bin/Release/net10.0/linux-x64/publish/NCalc.Tests